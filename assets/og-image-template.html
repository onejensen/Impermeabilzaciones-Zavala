<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
    }
    .card {
      width: 1200px;
      height: 630px;
      display: flex;
    }
    .left {
      width: 48%;
      position: relative;
      overflow: hidden;
      background: #0f2440;
    }
    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .left-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(15,36,64,0.35) 0%, rgba(27,58,92,0.7) 100%);
    }
    .right {
      width: 52%;
      background: #F5F0E8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px;
    }
    .label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #C9A84C;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .brand {
      font-size: 42px;
      font-weight: 700;
      color: #1B3A5C;
      line-height: 1.05;
      margin-bottom: 4px;
    }
    .location {
      font-size: 20px;
      font-weight: 300;
      color: #1B3A5C;
      opacity: 0.75;
      margin-bottom: 22px;
    }
    .divider {
      width: 36px;
      height: 2px;
      background: #C9A84C;
      margin-bottom: 22px;
    }
    .tagline {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .cta {
      display: inline-block;
      background: #1B3A5C;
      color: #F5F0E8;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 13px 22px;
      margin-bottom: 28px;
    }
    .url {
      font-size: 12px;
      color: #C9A84C;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <img src="../fotos_seleccion/photo_2026-03-24%2016.02.55.jpeg" alt="Trabajo de impermeabilización" />
      <div class="left-overlay"></div>
    </div>
    <div class="right">
      <div class="label">Impermeabilizaciones</div>
      <div class="brand">Zavala</div>
      <div class="location">Mallorca · Desde 2010</div>
      <div class="divider"></div>
      <div class="tagline">Sin filtraciones, garantizado.<br>Tejados · Terrazas · Fachadas</div>
      <div class="cta">Presupuesto gratis</div>
      <div class="url">imperzavala.com</div>
    </div>
  </div>
</body>
</html>
